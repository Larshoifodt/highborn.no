<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highborn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f8f7f4;
    color: #1a1a18;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: #efefed;
    border-bottom: 1px solid #e0ddd6;
    padding: 0 2.5rem;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  nav a {
    text-decoration: none;
    font-size: 13px;
    font-weight: 400;
    color: #6b6b65;
    letter-spacing: 0.01em;
    padding: 4px 0;
    border-bottom: 1.5px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  nav a:hover { color: #1a1a18; border-bottom-color: #1a1a18; }
  nav a.active { color: #1a1a18; border-bottom-color: #c8622a; }

  nav .logo {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 15px;
    color: #1a1a18;
    margin-right: auto;
    border: none;
    letter-spacing: -0.01em;
  }

  /* HERO */
  .hero {
    padding: 4rem 2.5rem 2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #c8622a;
    font-weight: 500;
    margin-bottom: 0.8rem;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 2.8rem;
    line-height: 1.1;
    color: #1a1a18;
    letter-spacing: -0.02em;
  }

  .hero h1 em { font-style: italic; color: #6b6b65; }

  /* TOOLBAR */
  .toolbar {
    max-width: 900px;
    margin: 2.5rem auto 0;
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    border-bottom: 1px solid #e0ddd6;
    padding-bottom: 0.8rem;
  }

  .toolbar-btn {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: #6b6b65;
    background: none;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .toolbar-btn:hover { background: #e8e6e0; color: #1a1a18; }
  .toolbar-btn.active { background: #1a1a18; color: #f8f7f4; }

  .toolbar-sep { width: 1px; height: 16px; background: #e0ddd6; margin: 0 4px; }

  .toolbar-path {
    margin-left: auto;
    font-size: 12px;
    color: #b0aea8;
    font-weight: 300;
  }

  /* FILE GRID */
  .file-grid {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 2.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1rem;
  }

  .file-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 1.2rem 0.8rem 0.8rem;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }

  .file-item:hover { background: #eeecea; }
  .file-item:hover .file-icon { transform: translateY(-2px); }

  .file-icon {
    width: 64px;
    height: 64px;
    transition: transform 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Folder SVG */
  .folder-svg { width: 64px; height: 54px; }

  .file-name {
    font-size: 12px;
    font-weight: 400;
    color: #1a1a18;
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
  }

  .file-meta {
    font-size: 10px;
    color: #b0aea8;
    text-align: center;
  }

  /* Doc icon */
  .doc-icon {
    width: 48px;
    height: 58px;
  }

  /* Status bar */
  .statusbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    background: #efefed;
    border-top: 1px solid #e0ddd6;
    display: flex;
    align-items: center;
    padding: 0 2rem;
    gap: 1.5rem;
    font-size: 11px;
    color: #b0aea8;
  }

  .statusbar span { color: #6b6b65; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo">Highborn</a>
  <a href="#" class="active">Hjem</a>
  <a href="#">Ressurser</a>

  <a href="#">Galleri</a>
  <a href="#">Txt</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Lars Høifødt</div>
  <h1>Min digitale<br><em>arbeidsmappe</em></h1>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="toolbar-btn active">⊞ Ikoner</button>
  <button class="toolbar-btn">☰ Liste</button>
  <div class="toolbar-sep"></div>
  <button class="toolbar-btn">↑ Navn</button>
  <span class="toolbar-path">highborn.no /</span>
</div>

<!-- FILES -->

        <rect x="0" y="14" width="64" height="40" rx="5" fill="#c2d9f0"/>
        <rect x="0" y="4" width="28" height="14" rx="4" fill="#c2d9f0"/>

        <rect x="0" y="8" width="64" height="46" rx="5" fill="#b8d8b0"/>
        <rect x="0" y="14" width="64" height="40" rx="5" fill="#cce8c4"/>

        <rect x="0" y="14" width="64" height="40" rx="5" fill="#e2ccea"/>

      </svg>

    <div class="file-meta">Tom</div>

  <!-- MAPPE: Galleri -->
  <a href="#" class="file-item">

      <svg class="folder-svg" viewBox="0 0 64 54" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="8" width="64" height="46" rx="5" fill="#f0b8a8"/>
        <rect x="0" y="14" width="64" height="40" rx="5" fill="#f5ccc0"/>

  <!-- FIL: KI i innkjøp -->
  <a href="presentasjoner/ki-innkjop.html" class="file-item">

</div>

<!-- STATUS BAR -->
<div class="statusbar">
    6 objekter &nbsp;·&nbsp; <span>highborn.no</span>
</div>

</body>
</html>
